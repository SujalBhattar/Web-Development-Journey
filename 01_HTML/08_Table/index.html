<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Structure</title>
</head>
<body>
    <h1>Welcome to the Table Structure</h1>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <tr>
            <td>Alice</td>
            <td>20</td>
            <td>Delhi</td>
        </tr>
        <tr>
            <td>Bob</td>
            <td>22</td>
            <td>Mumbai</td>
        </tr>
    </table>
</body>
</html>
